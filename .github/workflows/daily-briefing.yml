name: Daily Family Briefing

on:
  # Runs at 10:30 AM UTC = 6:30 AM EDT (Mar–Nov)
  # Change to 11:30 AM UTC (1130) when Daylight Saving Time ends in November
  schedule:
    - cron: "30 10 * * *"

  # Allow manual trigger from the GitHub Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily briefing
        env:
          GOOGLE_TOKEN_JSON:       ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          BRIEFING_SENDER:         ${{ secrets.BRIEFING_SENDER }}
          BRIEFING_RECIPIENTS:     ${{ secrets.BRIEFING_RECIPIENTS }}
          JOHN_CALENDAR_ID:        ${{ secrets.JOHN_CALENDAR_ID }}
          SUTTON_CALENDAR_ID:      ${{ secrets.SUTTON_CALENDAR_ID }}
        run: python daily_briefing.py
